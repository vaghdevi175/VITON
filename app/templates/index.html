<!DOCTYPE html>
<html>

<head>
<title>Virtual Try-On</title>
</head>

<body>

<h2>Virtual Try-On</h2>

<form action="/tryon" method="POST" enctype="multipart/form-data">

<p>Upload Person Image</p>
<input type="file" name="person" required>

<p>Upload Cloth Image</p>
<input type="file" name="cloth" required>

<br><br>

<button type="submit">Try On</button>

</form>

{% if result %}
<h3>Try-On Result</h3>
<img src="{{ result }}" width="300">
{% endif %}

</body>

</html>
